<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Slope Unblocked 76 avatar</title>
  <desc id="desc">A dark arcade-style square avatar with green slope lanes, a white ball, and SLOPE 76 text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.52" stop-color="#10233a"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9cff3b"/>
      <stop offset="1" stop-color="#00d48f"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.36" cy="0.3" r="0.78">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#dfe8f2"/>
      <stop offset="1" stop-color="#8fa6bc"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
