  <circle cx="506" cy="228" r="34" fill="#ffffff" opacity="0.82"/>
  <text x="512" y="840" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="138" font-weight="900" fill="#ffffff" letter-spacing="0">SLOPE</text>
